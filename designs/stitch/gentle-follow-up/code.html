<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>

                    "on-secondary-fixed": "#091d2e",
                    "surface-bright": "#373943",
                    "primary": "#cdbff0",
                    "secondary": "#b5c8df",
                    "primary-container": "#1b1137",
                    "on-primary-fixed": "#1f153b",
                    "surface-variant": "#32343e",
                    "surface-tint": "#cdbff0",
                    "on-tertiary-fixed-variant": "#454749",
                    "error-container": "#93000a",
                    "primary-fixed-dim": "#cdbff0",
                    "outline-variant": "#45464c",
                    "inverse-on-surface": "#2e303a",

<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-serif { font-family: 'Noto Serif SC', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .dream-orb-glow {
            box-shadow: 0 0 60px 10px rgba(27, 17, 55, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-x-hidden relative">
<!-- Celestial Background Texture -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary-container rounded-full blur-[120px] opacity-20"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[40%] h-[40%] bg-secondary-container rounded-full blur-[100px] opacity-10"></div>
</div>
<!-- Top Navigation (Shared Component - Suppressed active style for focus) -->
<header class="fixed top-0 w-full flex items-center justify-between px-6 h-16 bg-[#11131c]/70 backdrop-blur-2xl z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#b5c8df] hover:opacity-80 transition-opacity cursor-pointer">arrow_back</span>
<span class="text-xl font-serif text-[#cdbff0] tracking-widest">灵境回响</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden">
<img alt="Profile" class="w-full h-full object-cover grayscale opacity-80" data-alt="close up artistic portrait of a serene person with soft lighting against a dark moody background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHFgxERfv154hQYc0kA6lZxAsc92PjfZ17284t2bwQKCqCRke2oUCsA0koEKFxpNlJ5EQEnCOij5GjiSJcgjBC8bP-6zMpufVeuF0kuovl1NLbeMB0HELMSmhD69HhkC0WIkthNo1VRGrKCr8DTkJ8eeEtHEUxnhMZAn--ZZW863FgJwgvnRqDzv5A5gt3obxdL10Pq_XLuSxXB0RQ2b_TPkqcsqr1dRhSTDAGKgVTZZ1q6hUbZNUZR-1mI1wTLq4s0zwMvUnQJRnW"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-8 relative z-10 pt-20 pb-32">
<!-- Status Indicator -->
<div class="mb-12 flex flex-col items-center gap-3">
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-primary animate-pulse"></span>
<span class="text-secondary text-sm font-body tracking-[0.2em] font-light">正在悉心聆听你的余音...</span>
</div>
</div>
<!-- Central Inquiry Card -->
<div class="w-full max-w-lg relative">
<!-- Glassmorphism Container -->
<div class="bg-surface-container-low/40 backdrop-blur-3xl rounded-[2.5rem] p-10 md:p-14 text-center relative overflow-hidden border border-outline-variant/10">
<!-- Subtle Gradient Glow behind text -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary-container/20 blur-[80px] rounded-full pointer-events-none"></div>
<h1 class="text-2xl md:text-3xl font-serif text-on-surface leading-relaxed mb-12 tracking-wide relative z-10">
                    在这个梦里，你是否感觉到某种久违的熟悉感？
                </h1>
<!-- Choice Chips -->
<div class="flex flex-col gap-4 relative z-10">
<button class="group w-full py-5 px-6 rounded-2xl bg-surface-container-high/40 hover:bg-surface-container-highest/60 transition-all duration-500 flex items-center justify-between">
<span class="text-on-surface font-body font-light tracking-wide">是的，似曾相识</span>
<span class="material-symbols-outlined text-primary/0 group-hover:text-primary transition-all duration-300">colors_spark</span>
</button>
<button class="group w-full py-5 px-6 rounded-2xl bg-surface-container-high/40 hover:bg-surface-container-highest/60 transition-all duration-500 flex items-center justify-between">
<span class="text-on-surface font-body font-light tracking-wide">完全陌生</span>
<span class="material-symbols-outlined text-primary/0 group-hover:text-primary transition-all duration-300">blur_on</span>
</button>
<button class="group w-full py-5 px-6 rounded-2xl bg-surface-container-high/40 hover:bg-surface-container-highest/60 transition-all duration-500 flex items-center justify-between">
<span class="text-on-surface font-body font-light tracking-wide">某种模糊的指引</span>
<span class="material-symbols-outlined text-primary/0 group-hover:text-primary transition-all duration-300">navigation</span>
</button>
</div>
</div>
<!-- Asymmetrical Decorative Element -->
<div class="absolute -right-12 -top-12 w-24 h-24 flex items-center justify-center opacity-40 pointer-events-none">
<div class="w-full h-full rounded-full border border-primary/20 animate-[spin_20s_linear_infinite]"></div>
<span class="material-symbols-outlined absolute text-primary text-xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<!-- Primary Action Area -->
<div class="mt-16 w-full max-w-xs flex flex-col items-center gap-6">
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-[#b19ee6] text-on-primary-fixed font-semibold tracking-[0.3em] shadow-lg hover:shadow-primary/20 transition-all transform hover:-translate-y-0.5 active:scale-95">
                继续探索
            </button>
<a class="text-secondary/60 hover:text-secondary text-sm font-light tracking-widest transition-colors duration-300 underline-offset-8 hover:underline" href="#">
                跳过
            </a>
</div>
</main>
<!-- Bottom Aesthetic Detail (No full Nav Bar for focused Task flow) -->
<div class="fixed bottom-0 w-full flex justify-center pb-8 pointer-events-none opacity-20">
<div class="h-px w-32 bg-gradient-to-r from-transparent via-primary to-transparent"></div>
</div>
<!-- Background Atmospheric Image -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<img alt="Atmosphere" class="w-full h-full object-cover opacity-10 mix-blend-screen" data-alt="misty deep purple night sky with faint stars and soft nebula clouds ethereal and mysterious atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQaHRT6B6R3Quabm17RGq9OFOJGjucQcx4O0E_Tjqvin52_7fxVcaniCGR397YQSqhDxEARvy9VKBasItf9-_Eeq8KUAxu38oDNciZ9vn-9cZdhhWMiggtgL2HE3sgQc-Xrfqmgt-n6QwlyhnEkA9F12i3OGKNLHCOqye2GRqGO_zTgLPsK8Rzxv-qezXieVbsik3plYsDcgp0U8l1u6io10zOY3yZPRcZGu29aC2_qViRU97nPc8okoMqOJLYXknsYhRQ27WKHzY3"/>
</div>
</body></html>
