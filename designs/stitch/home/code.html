<style>
        body { font-family: 'Manrope', sans-serif; background-color: #11131c; }

<body class="text-on-surface selection:bg-primary/30 moonlight-gradient min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex items-center justify-between px-6 h-16 bg-[#11131c]/70 backdrop-blur-2xl z-50">
<div class="flex items-center gap-4">
<button class="text-[#cdbff0] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-xl font-serif text-[#cdbff0] tracking-widest">灵境回响</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/20">

<main class="pt-32 px-6 max-w-2xl mx-auto space-y-16">
<!-- Hero Section -->
<section class="text-center space-y-4">
<h2 class="text-4xl md:text-5xl font-serif text-on-surface leading-tight tracking-wide">
                告诉我你的梦，<br/>向月亮低语
            </h2>
<p class="text-secondary font-body font-light tracking-[0.2em] opacity-80">
                梦境在此安放
            </p>
</section>
<!-- Signature Component: The Dream Orb -->
<section class="flex flex-col items-center justify-center py-8">
<button class="relative group w-48 h-48 flex items-center justify-center">
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-secondary rounded-full blur-xl opacity-20 group-active:scale-95 transition-transform duration-500"></div>
<div class="relative w-40 h-40 bg-gradient-to-br from-primary via-primary-fixed-dim to-secondary rounded-full dream-orb-glow flex flex-col items-center justify-center border border-primary/20 transition-all duration-500 group-hover:scale-105 active:scale-95">
<span class="material-symbols-outlined text-on-primary-fixed text-4xl mb-2" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="text-on-primary-fixed font-serif font-bold tracking-widest text-lg">开始讲述</span>
</div>
</button>
</section>
<!-- Echoes Card -->
<section class="space-y-6">
<div class="flex justify-between items-end">
<h3 class="text-xl font-serif text-primary border-l-2 border-primary pl-4">昨夜的回响</h3>
<span class="text-secondary/50 text-xs tracking-widest">2024.05.20</span>
</div>
<div class="bg-surface-container-low rounded-xl p-8 space-y-4 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-5">
<span class="material-symbols-outlined text-8xl" data-icon="format_quote">format_quote</span>
</div>
<p class="text-lg font-serif italic text-on-surface/90 leading-relaxed">
                    “我漫步在一片紫色的森林中，脚下的泥土是柔软的星云，树木低声吟唱着古老的歌谣，光影在叶尖轻盈地跳跃...”
                </p>
<div class="flex items-center gap-2 pt-4 group cursor-pointer">
<span class="text-secondary font-body text-sm tracking-widest transition-all group-hover:translate-x-1">继续阅读</span>
<span class="material-symbols-outlined text-secondary text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
</div>
</section>
<!-- Themes Section -->

<span class="material-symbols-outlined text-primary/60 text-3xl" data-icon="flight">flight</span>
<span class="text-on-surface font-serif text-lg tracking-widest">飞行</span>
</div>
<div class="flex-none w-40 aspect-[3/4] bg-surface-container-high rounded-xl p-4 flex flex-col justify-between items-start transition-all hover:bg-surface-bright">
<span class="material-symbols-outlined text-primary/60 text-3xl" data-icon="waves">waves</span>
<span class="text-on-surface font-serif text-lg tracking-widest">深海</span>
</div>
<div class="flex-none w-40 aspect-[3/4] bg-surface-container-high rounded-xl p-4 flex flex-col justify-between items-start transition-all hover:bg-surface-bright">
<span class="material-symbols-outlined text-primary/60 text-3xl" data-icon="forest">forest</span>
<span class="text-on-surface font-serif text-lg tracking-widest">迷失</span>
</div>
<div class="flex-none w-40 aspect-[3/4] bg-surface-container-high rounded-xl p-4 flex flex-col justify-between items-start transition-all hover:bg-surface-bright">
<span class="material-symbols-outlined text-primary/60 text-3xl" data-icon="auto_awesome">auto_awesome</span>
<span class="text-on-surface font-serif text-lg tracking-widest">奇遇</span>
</div>
</div>
</section>
<!-- Refuge Section -->
<section class="pb-12">
<div class="bg-gradient-to-r from-surface-container-high to-surface-container-highest rounded-xl p-6 flex items-center justify-between group cursor-pointer transition-all active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="bedtime" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</div>
<div>
<h4 class="text-on-surface font-serif tracking-widest">避风港</h4>
<p class="text-secondary/60 text-xs font-body">寻求梦境的安宁解析</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary transition-transform group-hover:translate-x-2" data-icon="chevron_right">chevron_right</span>
</div>

<span class="material-symbols-outlined" data-icon="bedtime">bedtime</span>
<span class="font-sans text-[11px] font-light tracking-tighter">避风港</span>
</a>
